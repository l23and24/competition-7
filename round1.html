<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мікросвіт: Атоми заліза</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            background-color: #050505;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            color: white;
        }
        canvas {
            display: block;
        }
        .info-panel {
            position: absolute;
            top: 20px;
            text-align: center;
            pointer-events: none;
            width: 100%;
            z-index: 10;
        }
        h1 {
            font-size: clamp(16px, 5vw, 24px);
            margin: 0;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }
        p {
            font-size: clamp(10px, 3vw, 14px);
            color: #888;
            margin: 5px 0 0 0;
        }
    </style>
</head>
<body>

<div class="info-panel">
    <h1>Поперечний зріз залізної кульки</h1>
    <p>Збільшення: x1 000 000 000 | Натисніть, щоб збовтати</p>
</div>

<script>
let atoms = [];
let numAtoms = 80; 
let containerRadius;
let centerX, centerY;

function setup() {
    // Створюємо полотно на всю ширину та висоту вікна
    createCanvas(windowWidth, windowHeight);
    recalculateLayout();
    
    // Початкове створення атомів
    for (let i = 0; i < numAtoms; i++) {
        let angle = random(TWO_PI);
        let r = random(containerRadius - 20); 
        let x = r * cos(angle);
        let y = r * sin(angle);
        atoms.push(new Atom(x, y, i));
    }
}

function draw() {
    background(5);

    // Центрування всієї сцени
    push();
    translate(centerX, centerY);
    
    // Малювання контейнера (об'єктив)
    // Зовнішнє кільце
    noFill();
    stroke(50);
    strokeWeight(12);
    ellipse(0, 0, containerRadius * 2 + 20);
    
    // Внутрішня область
    fill(10, 10, 20);
    noStroke();
    ellipse(0, 0, containerRadius * 2);
    
    // Блік на лінзі
    noFill();
    stroke(255, 15);
    strokeWeight(3);
    arc(0, 0, containerRadius * 1.9, containerRadius * 1.9, -HALF_PI - QUARTER_PI, -HALF_PI + QUARTER_PI);
    
    // Оновлення та відображення атомів
    for (let atom of atoms) {
        atom.collide(); 
        atom.update();
        atom.checkWalls();
        atom.display();
    }
    pop();

    // Взаємодія з мишкою або тачем
    if (mouseIsPressed) {
        let mouseV = createVector(mouseX - centerX, mouseY - centerY);
        for (let atom of atoms) {
            let d = p5.Vector.dist(mouseV, atom.pos);
            if (d < 120) {
                let force = p5.Vector.sub(atom.pos, mouseV);
                force.setMag(0.8);
                atom.vel.add(force);
            }
        }
    }
}

// Функція для перерахунку розмірів при зміні вікна
function recalculateLayout() {
    centerX = width / 2;
    centerY = height / 2;
    // Радіус залежить від найменшої сторони екрана
    containerRadius = min(width, height) * 0.42;
}

function windowResized() {
    resizeCanvas(windowWidth, windowHeight);
    recalculateLayout();
}

class Atom {
    constructor(x, y, id) {
        this.pos = createVector(x, y);
        this.vel = p5.Vector.random2D().mult(random(1, 3));
        this.radius = 8;
        this.id = id;
        this.mass = 1;
    }

    update() {
        this.pos.add(this.vel);
        this.vel.mult(0.997); // Легке тертя
    }

    collide() {
        for (let i = this.id + 1; i < atoms.length; i++) {
            let other = atoms[i];
            let distVec = p5.Vector.sub(other.pos, this.pos);
            let distance = distVec.mag();
            let minDist = this.radius + other.radius;

            if (distance < minDist) {
                let normal = distVec.copy().normalize();
                let relativeVelocity = p5.Vector.sub(this.vel, other.vel);
                let speed = relativeVelocity.dot(normal);

                if (speed > 0) {
                    let impulse = (2 * speed) / (this.mass + other.mass);
                    let impulseVec = normal.copy().mult(impulse);
                    this.vel.sub(impulseVec);
                    other.vel.add(impulseVec);
                }
                
                // Виштовхування для запобігання злипанню
                let overlap = minDist - distance;
                let correction = normal.copy().mult(overlap / 2);
                this.pos.sub(correction);
                other.pos.add(correction);
            }
        }
    }

    checkWalls() {
        let d = this.pos.mag();
        if (d > containerRadius - this.radius) {
            let normal = this.pos.copy().normalize();
            let dot = this.vel.dot(normal);
            if (dot > 0) {
                let reflection = p5.Vector.mult(normal, 2 * dot);
                this.vel.sub(reflection);
            }
            this.pos = normal.mult(containerRadius - this.radius);
        }
    }

    display() {
        push();
        translate(this.pos.x, this.pos.y);
        noStroke();
        
        // Сяйво електронної оболонки
        fill(100, 150, 255, 25);
        ellipse(0, 0, this.radius * 3.5);

        // Основне тіло атома
        fill(170, 180, 200);
        ellipse(0, 0, this.radius * 2);
        
        // Металевий блік
        fill(255, 180);
        ellipse(-this.radius * 0.35, -this.radius * 0.35, this.radius * 0.8);
        
        // Тінь
        fill(0, 40);
        arc(0, 0, this.radius * 2, this.radius * 2, 0, PI);
        pop();
    }
}
</script>

</body>
</html>
