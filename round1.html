<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мікросвіт: Атоми заліза</title>
    <!-- Підключення бібліотеки p5.js для візуалізації -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            background-color: #020205;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            color: white;
        }
        canvas {
            display: block;
        }
        .overlay {
            position: absolute;
            top: 20px;
            text-align: center;
            pointer-events: none;
            width: 100%;
            z-index: 10;
        }
        h1 {
            font-size: clamp(16px, 4vw, 22px);
            margin: 0;
            font-weight: 300;
            letter-spacing: 2px;
            color: #b0c0e0;
            text-transform: uppercase;
        }
        .subtitle {
            font-size: 10px;
            color: #445577;
            margin-top: 4px;
            letter-spacing: 1px;
        }
        .controls {
            position: absolute;
            bottom: 25px;
            z-index: 20;
        }
        button {
            background: rgba(20, 30, 50, 0.6);
            border: 1px solid rgba(100, 150, 255, 0.3);
            color: #80a0ff;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: 0.3s;
            font-size: 12px;
            pointer-events: auto;
        }
        button:hover {
            background: rgba(100, 150, 255, 0.2);
            color: white;
            border-color: #6496ff;
        }
    </style>
</head>
<body>

<div class="overlay">
    <h1>Atomic Iron Simulation</h1>
    <div class="subtitle">СИМУЛЯЦІЯ ТЕПЛОВОГО РУХУ АТОМІВ (Fe)</div>
</div>

<div class="controls">
    <button id="sound-btn" onclick="toggleAtmosphere()">УВІМКНУТИ ЗВУК 🔊</button>
</div>

<script>
let atoms = [];
let numAtoms = 75; 
let lensRadius;
let cx, cy;
let temp = 2.5; // Базова швидкість (температура)

// Аудіо змінні
let audioCtx, masterGain, isSounding = false;

function setup() {
    // Створюємо полотно на весь екран
    createCanvas(windowWidth, windowHeight);
    updateLayout();
    
    // Створення атомів у випадкових позиціях всередині кола
    for (let i = 0; i < numAtoms; i++) {
        let angle = random(TWO_PI);
        let dist = random(lensRadius - 20); 
        atoms.push(new Atom(dist * cos(angle), dist * sin(angle), i));
    }
}

function draw() {
    background(3, 3, 7); 

    push();
    translate(cx, cy);
    
    // Тло "лінзи" мікроскопа
    noStroke();
    fill(10, 12, 20);
    ellipse(0, 0, lensRadius * 2);
    
    // Віньєтування для ефекту глибини
    let grad = drawingContext.createRadialGradient(0, 0, lensRadius * 0.5, 0, 0, lensRadius);
    grad.addColorStop(0, 'rgba(10,15,30,0)');
    grad.addColorStop(1, 'rgba(0,0,0,0.85)');
    drawingContext.fillStyle = grad;
    ellipse(0, 0, lensRadius * 2);

    // Оновлення та відтворення атомів
    for (let a of atoms) {
        a.physics(); 
        a.move();
        a.bounds();
        a.display();
    }
    
    // Оправа мікроскопа
    noFill();
    stroke(45, 48, 58);
    strokeWeight(15);
    ellipse(0, 0, lensRadius * 2 + 15);
    
    // Скляний відблиск
    stroke(255, 10);
    strokeWeight(2);
    arc(0, 0, lensRadius * 1.95, lensRadius * 1.95, -2.5, -0.5);
    pop();

    // Взаємодія з мишкою
    if (mouseIsPressed) {
        let mV = createVector(mouseX - cx, mouseY - cy);
        for (let a of atoms) {
            let d = p5.Vector.dist(mV, a.pos);
            if (d < 150) {
                let pushForce = p5.Vector.sub(a.pos, mV).setMag(0.5);
                a.vel.add(pushForce);
            }
        }
    }
}

function updateLayout() {
    cx = width / 2;
    cy = height / 2;
    lensRadius = min(width, height) * 0.42;
}

function windowResized() {
    resizeCanvas(windowWidth, windowHeight);
    updateLayout();
}

class Atom {
    constructor(x, y, id) {
        this.pos = createVector(x, y);
        this.vel = p5.Vector.random2D().mult(random(1, temp));
        this.radius = 7;
        this.id = id;
        this.history = [];
    }

    move() {
        // Зберігаємо хвостик для ефекту руху
        this.history.push(this.pos.copy());
        if (this.history.length > 6) this.history.shift();

        this.pos.add(this.vel);
        
        // Підтримка швидкості (термостат)
        let s = this.vel.mag();
        if (s > 0) this.vel.mult(lerp(1, temp / s, 0.04));
        
        // Броунівський шум (випадкові мікро-поштовхи)
        this.vel.add(p5.Vector.random2D().mult(0.05));
    }

    physics() {
        for (let i = this.id + 1; i < atoms.length; i++) {
            let other = atoms[i];
            let dVec = p5.Vector.sub(other.pos, this.pos);
            let d = dVec.mag();
            let minD = this.radius * 2;

            if (d < minD) {
                let n = dVec.normalize();
                let relV = p5.Vector.sub(this.vel, other.vel);
                let sep = relV.dot(n);

                if (sep > 0) {
                    let v = n.mult(sep);
                    this.vel.sub(v);
                    other.vel.add(v);
                    if (isSounding && sep > 0.5) playTone(800 + random(500), 0.004);
                }
                // Запобігання перекриттю
                let c = n.mult((minD - d) / 2);
                this.pos.sub(c);
                other.pos.add(c);
            }
        }
    }

    bounds() {
        let d = this.pos.mag();
        if (d > lensRadius - this.radius) {
            let n = this.pos.copy().normalize();
            let dot = this.vel.dot(n);
            if (dot > 0) {
                this.vel.sub(p5.Vector.mult(n, 2 * dot));
                if (isSounding) playTone(140, 0.02);
            }
            this.pos = n.mult(lensRadius - this.radius);
        }
    }

    display() {
        // Малювання шлейфу
        noFill();
        for (let i = 0; i < this.history.length; i++) {
            let a = map(i, 0, this.history.length, 0, 40);
            stroke(100, 160, 255, a);
            ellipse(this.history[i].x, this.history[i].y, this.radius * 2);
        }

        push();
        translate(this.pos.x, this.pos.y);
        noStroke();
        
        // Електронна оболонка
        fill(100, 180, 255, 25);
        ellipse(0, 0, this.radius * 4);

        // Ядро атома
        fill(170, 185, 205);
        ellipse(0, 0, this.radius * 2);
        
        // Блік
        fill(255, 200);
        ellipse(-this.radius * 0.4, -this.radius * 0.4, this.radius * 0.7);
        pop();
    }
}

// ЗВУКОВА СИСТЕМА (Web Audio API)
function initAudio() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.connect(audioCtx.destination);
    masterGain.gain.setValueAtTime(0, audioCtx.currentTime);

    // Фоновий ембієнт (дрон)
    createDrone(55, 0.2); 
    createDrone(82, 0.1); 
}

function createDrone(f, v) {
    let osc = audioCtx.createOscillator();
    let g = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = f;
    g.gain.value = v;
    osc.connect(g);
    g.connect(masterGain);
    osc.start();
}

function playTone(f, v) {
    if (!isSounding) return;
    let osc = audioCtx.createOscillator();
    let g = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(f, audioCtx.currentTime);
    g.gain.setValueAtTime(v, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.15);
    osc.connect(g);
    g.connect(masterGain);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.15);
}

function toggleAtmosphere() {
    if (!audioCtx) initAudio();
    const btn = document.getElementById('sound-btn');

    if (audioCtx.state === 'suspended') audioCtx.resume();

    if (!isSounding) {
        masterGain.gain.setTargetAtTime(0.5, audioCtx.currentTime, 0.5);
        isSounding = true;
        btn.innerHTML = "ВИМКНУТИ ЗВУК 🔇";
    } else {
        masterGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5);
        isSounding = false;
        btn.innerHTML = "УВІМКНУТИ ЗВУК 🔊";
    }
}
</script>

</body>
</html>
