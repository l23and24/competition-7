<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Симуляція руху автобуса на поворотах</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0f172a;
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: white;
            user-select: none;
        }
        canvas { 
            display: block;
            width: 100vw;
            height: 100vh;
        }
        .ui-panel {
            position: absolute;
            top: env(safe-area-inset-top, 20px);
            left: 20px;
            pointer-events: none;
            z-index: 50;
        }
        .controls {
            position: absolute;
            bottom: env(safe-area-inset-bottom, 30px);
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: clamp(8px, 3vw, 20px);
            z-index: 100;
        }
        .btn-steer {
            width: clamp(60px, 12vw, 80px);
            height: clamp(60px, 12vw, 80px);
            border-radius: 20px;
            background: rgba(15, 23, 42, 0.9);
            border: 2px solid rgba(56, 189, 248, 0.3);
            color: #38bdf8;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            pointer-events: auto;
            transition: all 0.1s ease;
            backdrop-filter: blur(8px);
            touch-action: manipulation;
        }
        .btn-steer:active {
            transform: scale(0.9);
            background: #38bdf8;
            color: #020617;
        }
        .btn-action {
            padding: 12px 20px;
            border-radius: 12px;
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(148, 163, 184, 0.3);
            color: #f1f5f9;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            pointer-events: auto;
            transition: all 0.2s ease;
            backdrop-filter: blur(8px);
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-action:hover {
            background: #1e293b;
            border-color: #38bdf8;
        }
        .btn-action:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

<div class="ui-panel">
    <h1 class="text-xl md:text-3xl font-black tracking-tighter italic leading-none mb-1 uppercase">
        <span class="text-sky-500">Симуляція руху на поворотах</span>
    </h1>
</div>

<div class="controls">
    <div class="btn-steer" id="btnL" role="button">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
        </svg>
    </div>
    
    <button class="btn-action" id="btnPause">
        <span id="pauseLabel">Пауза</span>
    </button>

    <button class="btn-action" id="btnReset">На початок</button>

    <div class="btn-steer" id="btnR" role="button">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
        </svg>
    </div>
</div>

<canvas id="simCanvas"></canvas>

<script>
    const canvas = document.getElementById('simCanvas');
    const ctx = canvas.getContext('2d');

    let width, height;
    let isPaused = false;
    
    // Audio Context для звуку мотора
    let audioCtx = null;
    let motorOsc = null;
    let motorGain = null;

    let bus = {
        x: 0,
        y: 0,
        angle: 0, 
        w: 420,
        h: 150,
        linearSpeed: 0.8, 
        angularSpeed: 0.005,
        turnImpact: 0,
        autoPilot: true
    };

    const COLORS = {
        busBody: '#1e293b',
        glass: 'rgba(186, 230, 253, 0.25)',
        seat: '#0f172a',
        driver: '#1e40af',
        skin: '#ffdbac',
        road: '#1e293b',
        marking: '#94a3b8'
    };

    // Ініціалізація звуку
    function initAudio() {
        if (audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        motorOsc = audioCtx.createOscillator();
        motorGain = audioCtx.createGain();
        
        motorOsc.type = 'sawtooth';
        motorOsc.frequency.setValueAtTime(50, audioCtx.currentTime); // Базова частота гуркоту
        
        // Фільтр для м'якшого звуку
        const filter = audioCtx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(200, audioCtx.currentTime);
        
        motorOsc.connect(filter);
        filter.connect(motorGain);
        motorGain.connect(audioCtx.destination);
        
        motorGain.gain.setValueAtTime(0, audioCtx.currentTime);
        motorOsc.start();
    }

    function updateAudio() {
        if (!audioCtx || !motorOsc || !motorGain) return;
        
        if (isPaused) {
            motorGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
        } else {
            motorGain.gain.setTargetAtTime(0.15, audioCtx.currentTime, 0.1);
            // Частота залежить від повороту (імітація навантаження)
            const freq = 50 + Math.abs(bus.turnImpact) * 30;
            motorOsc.frequency.setTargetAtTime(freq, audioCtx.currentTime, 0.1);
        }
    }

    class Passenger {
        constructor(row, side, isDriver = false) {
            this.row = row;
            this.side = side;
            this.isDriver = isDriver;
            this.lean = 0;
            this.color = isDriver ? COLORS.driver : `hsl(${210 + Math.random() * 20}, ${30 + Math.random() * 20}%, ${40 + Math.random() * 20}%)`;
            this.bob = Math.random() * Math.PI;
        }

        update(turnDirection) {
            if (isPaused) return;
            const targetLean = turnDirection * 35; 
            this.lean += (targetLean - this.lean) * 0.03; 
            this.bob += 0.01;

            const maxLean = 15;
            if (this.lean > maxLean) this.lean = maxLean;
            if (this.lean < -maxLean) this.lean = -maxLean;
        }

        draw(bx, by, bw, bh, angle) {
            ctx.save();
            ctx.translate(bx, by);
            ctx.rotate(angle);

            let px, py;
            if (this.isDriver) {
                px = bw/2 - 65;
                py = -bh/2 + 40 + this.lean;
            } else {
                px = -bw/2 + 90 + this.row * 55;
                py = this.side * 38 + this.lean;
            }

            const vib = Math.sin(Date.now() * 0.005) * 0.15;

            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.ellipse(px, py + vib, 11, 15, this.lean * 0.01, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = COLORS.skin;
            ctx.beginPath();
            ctx.arc(px + Math.sin(this.bob) * 0.3, py + vib, 8, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
        }
    }

    let passengers = [];
    function initPassengers() {
        passengers = [];
        passengers.push(new Passenger(0, -1, true)); 
        for(let r=0; r<5; r++) {
            passengers.push(new Passenger(r, -1));
            passengers.push(new Passenger(r, 1));
        }
    }

    function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
        
        const scale = Math.min(1, width / 750);
        bus.w = 420 * scale;
        bus.h = 150 * scale;

        if (bus.x === 0 && bus.y === 0) {
            resetBus();
        }
    }

    function resetBus() {
        bus.x = width * 0.15;
        bus.y = height / 2 + 120;
        bus.angle = 0;
        bus.turnImpact = 0;
        bus.autoPilot = true;
        if (isPaused) togglePause();
    }

    function getRoadY(x) {
        const relX = x - (width * 0.15);
        return height/2 + Math.sin(relX * 0.001) * 180 + Math.sin(relX * 0.0005) * 80;
    }

    function drawRoad() {
        ctx.save();
        const roadWidth = 500;
        const segments = 25;
        const step = width / segments;
        const offsetX = bus.x - (width * 0.15);

        ctx.fillStyle = '#0f172a';
        ctx.fillRect(0,0, width, height);

        ctx.beginPath();
        ctx.strokeStyle = '#1e293b';
        ctx.lineWidth = roadWidth;
        ctx.lineJoin = 'round';
        ctx.lineCap = 'round';
        ctx.beginPath();
        for (let i = -5; i <= segments + 5; i++) {
            const x = i * step;
            const worldX = x + offsetX;
            const y = getRoadY(worldX);
            if (i === -5) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        }
        ctx.stroke();

        ctx.lineWidth = 8;
        ctx.strokeStyle = '#334155';
        [-1, 1].forEach(side => {
            ctx.beginPath();
            for (let i = -5; i <= segments + 5; i++) {
                const x = i * step;
                const worldX = x + offsetX;
                const y = getRoadY(worldX) + (side * (roadWidth/2 - 10));
                if (i === -5) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();
        });

        ctx.setLineDash([40, 60]);
        ctx.lineDashOffset = offsetX;
        ctx.strokeStyle = '#475569';
        ctx.lineWidth = 4;
        ctx.beginPath();
        for (let i = -5; i <= segments + 5; i++) {
            const x = i * step;
            const worldX = x + offsetX;
            const y = getRoadY(worldX);
            if (i === -5) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        }
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.restore();
    }

    function drawBus() {
        ctx.save();
        ctx.translate(bus.x, bus.y);
        ctx.rotate(bus.angle);

        ctx.shadowColor = 'rgba(0,0,0,0.8)';
        ctx.shadowBlur = 40;
        ctx.shadowOffsetY = 20;

        ctx.fillStyle = '#000';
        ctx.fillRect(-bus.w/2 + 60, -bus.h/2 - 8, 50, 15);
        ctx.fillRect(-bus.w/2 + 60, bus.h/2 - 7, 50, 15);

        const wheelSteer = bus.turnImpact * 0.35;
        ctx.save();
        ctx.translate(bus.w/2 - 100, -bus.h/2 - 2); ctx.rotate(wheelSteer); ctx.fillRect(-25, -8, 50, 15);
        ctx.restore();
        ctx.save();
        ctx.translate(bus.w/2 - 100, bus.h/2 + 2); ctx.rotate(wheelSteer); ctx.fillRect(-25, -8, 50, 15);
        ctx.restore();

        const bodyGrad = ctx.createLinearGradient(0, -bus.h/2, 0, bus.h/2);
        bodyGrad.addColorStop(0, '#334155');
        bodyGrad.addColorStop(0.5, '#1e293b');
        bodyGrad.addColorStop(1, '#0f172a');
        ctx.fillStyle = bodyGrad;
        ctx.beginPath();
        ctx.roundRect(-bus.w / 2, -bus.h / 2, bus.w, bus.h, 15);
        ctx.fill();

        ctx.fillStyle = '#020617';
        ctx.beginPath();
        ctx.roundRect(-bus.w / 2 + 10, -bus.h / 2 + 10, bus.w - 20, bus.h - 20, 10);
        ctx.fill();

        ctx.fillStyle = '#fef08a';
        ctx.shadowBlur = 15;
        ctx.shadowColor = '#fef08a';
        ctx.fillRect(bus.w/2 - 5, -bus.h/2 + 20, 8, 25);
        ctx.fillRect(bus.w/2 - 5, bus.h/2 - 45, 8, 25);

        ctx.restore();
    }

    const keys = {};
    window.onkeydown = (e) => {
        if (e.key === ' ') {
            togglePause();
            return;
        }
        keys[e.key] = true;
        if(['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
            bus.autoPilot = false;
        }
        initAudio(); // Спроба ініціалізації звуку при будь-якій дії
    };
    window.onkeyup = (e) => keys[e.key] = false;

    const btnL = document.getElementById('btnL');
    const btnR = document.getElementById('btnR');
    const btnReset = document.getElementById('btnReset');
    const btnPause = document.getElementById('btnPause');
    const pauseLabel = document.getElementById('pauseLabel');

    function togglePause() {
        isPaused = !isPaused;
        pauseLabel.textContent = isPaused ? 'Продовжити' : 'Пауза';
        initAudio();
    }

    const startL = (e) => { e.preventDefault(); moveL = true; bus.autoPilot = false; initAudio(); };
    const startR = (e) => { e.preventDefault(); moveR = true; bus.autoPilot = false; initAudio(); };
    const end = () => { moveL = moveR = false; };

    let moveL = false, moveR = false;

    btnL.addEventListener('mousedown', startL);
    btnL.addEventListener('touchstart', startL);
    btnR.addEventListener('mousedown', startR);
    btnR.addEventListener('touchstart', startR);
    btnReset.addEventListener('click', () => { resetBus(); initAudio(); });
    btnPause.addEventListener('click', togglePause);
    window.addEventListener('mouseup', end);
    window.addEventListener('touchend', end);

    function update() {
        if (isPaused) {
            updateAudio();
            return;
        }

        let targetImpact = 0;
        if (bus.autoPilot) {
            const lookAhead = 100;
            const futureX = bus.x + Math.cos(bus.angle) * lookAhead;
            const laneOffset = 120;
            const targetY = getRoadY(futureX) + laneOffset;
            const error = targetY - bus.y;
            targetImpact = Math.max(-1, Math.min(1, error * 0.02));
        } else {
            if (keys['ArrowUp'] || keys['ArrowLeft'] || moveL) targetImpact = -1;
            else if (keys['ArrowDown'] || keys['ArrowRight'] || moveR) targetImpact = 1;
        }

        bus.turnImpact += (targetImpact - bus.turnImpact) * 0.08;
        bus.angle += bus.turnImpact * bus.angularSpeed;
        
        bus.x += Math.cos(bus.angle) * bus.linearSpeed;
        bus.y += Math.sin(bus.angle) * bus.linearSpeed;
        
        passengers.forEach(p => p.update(bus.turnImpact));
        updateAudio();
    }

    function loop() {
        ctx.clearRect(0, 0, width, height);
        drawRoad();
        update();
        drawBus();
        passengers.forEach(p => p.draw(bus.x, bus.y, bus.w, bus.h, bus.angle));
        requestAnimationFrame(loop);
    }

    initPassengers();
    window.addEventListener('resize', resize);
    resize();
    loop();

    // Додаткова ініціалізація звуку при першому кліку
    window.addEventListener('click', initAudio, { once: true });
</script>

</body>
</html>
