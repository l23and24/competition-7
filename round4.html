<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Зіткнення тепловоза з вагоном</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #1e293b; /* Трохи світліший темно-синій фон */
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: white;
        }
        canvas {
            display: block;
        }
        .ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            pointer-events: none;
        }
        .controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.95);
            padding: 24px;
            border-radius: 20px;
            border: 1px solid rgba(56, 189, 248, 0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            pointer-events: auto;
        }
        .btn-group {
            display: flex;
            gap: 10px;
        }
        .btn {
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: bold;
            transition: all 0.2s;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 13px;
            border: none;
        }
        .btn-blue { background: #0ea5e9; color: white; }
        .btn-blue:hover { background: #0284c7; transform: translateY(-2px); }
        .btn-amber { background: #f59e0b; color: white; }
        .btn-amber:hover { background: #d97706; transform: translateY(-2px); }
        .btn-slate { background: #475569; color: white; }
        
        .sound-hint {
            font-size: 10px;
            color: #94a3b8;
            margin-top: 8px;
        }
    </style>
</head>
<body>

<div class="ui-overlay">
    <h1 class="text-3xl font-black italic tracking-tighter text-sky-400">ЗІТКНЕННЯ ТЕПЛОВОЗА З ВАГОНОМ</h1>
</div>

<div class="controls">
    <div class="btn-group">
        <button class="btn btn-blue" onclick="startCollision('empty')">Зіткнення з порожнім</button>
        <button class="btn btn-amber" onclick="startCollision('heavy')">Зіткнення з важким</button>
        <button class="btn btn-slate" onclick="resetSim()">Скинути</button>
    </div>
    <p class="sound-hint italic text-center">Натисніть кнопку для запуску симуляції</p>
</div>

<canvas id="simCanvas"></canvas>

<script>
    const canvas = document.getElementById('simCanvas');
    const ctx = canvas.getContext('2d');

    let width, height;
    let locomotive = { x: -250, y: 0, w: 200, h: 80, v: 0, color: '#0ea5e9' };
    let wagon = { x: 0, y: 0, w: 180, h: 80, v: 0, type: 'empty', color: '#64748b' };
    let particles = [];
    let collisionOccurred = false;

    // --- Звукова система ---
    let audioCtx = null;
    let engineOsc = null;
    let engineGain = null;

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            engineOsc = audioCtx.createOscillator();
            engineGain = audioCtx.createGain();
            engineOsc.type = 'sawtooth';
            engineOsc.frequency.value = 40; 
            engineGain.gain.value = 0;
            engineOsc.connect(engineGain);
            engineGain.connect(audioCtx.destination);
            engineOsc.start();
        }
    }

    function playCollisionSound() {
        if (!audioCtx) return;
        const noise = audioCtx.createOscillator();
        const noiseGain = audioCtx.createGain();
        noise.type = 'square';
        noise.frequency.setValueAtTime(120, audioCtx.currentTime);
        noise.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 0.4);
        noiseGain.gain.setValueAtTime(0.4, audioCtx.currentTime);
        noiseGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
        noise.connect(noiseGain);
        noiseGain.connect(audioCtx.destination);
        noise.start();
        noise.stop(audioCtx.currentTime + 0.4);
    }

    function updateEngineSound() {
        if (!engineGain) return;
        const speedRatio = Math.min(Math.abs(locomotive.v) / 8, 1.5);
        engineGain.gain.setTargetAtTime(speedRatio * 0.08, audioCtx.currentTime, 0.1);
        engineOsc.frequency.setTargetAtTime(40 + (speedRatio * 50), audioCtx.currentTime, 0.1);
    }

    // --- Логіка симуляції ---
    function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
        locomotive.y = wagon.y = height / 2;
        resetSim();
    }

    function resetSim() {
        collisionOccurred = false;
        locomotive.x = 50;
        locomotive.v = 0;
        wagon.x = width - 400; 
        wagon.v = 0;
        particles = [];
    }

    function startCollision(type) {
        initAudio();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        
        resetSim();
        wagon.type = type;
        wagon.color = type === 'empty' ? '#94a3b8' : '#78350f';
        locomotive.v = 6; 
    }

    function createSpark(x, y) {
        for(let i=0; i<35; i++) {
            particles.push({
                x: x, y: y,
                vx: (Math.random() - 0.5) * 15,
                vy: (Math.random() - 0.5) * 15,
                life: 1
            });
        }
    }

    function update() {
        locomotive.x += locomotive.v;
        wagon.x += wagon.v;

        updateEngineSound();

        // ЛОГІКА АНТИФІЗИКИ
        if (!collisionOccurred && locomotive.x + locomotive.w >= wagon.x) {
            createSpark(wagon.x, wagon.y);
            playCollisionSound();
            collisionOccurred = true;

            if (wagon.type === 'empty') {
                // АНОМАЛІЯ 1: Тепловоз майже зупиняється об "невагомий" вагон
                locomotive.v = 0.3; 
                wagon.v = 0.6; 
            } else {
                // АНОМАЛІЯ 2: Важкий вагон прискорюється (корекція швидкості)
                wagon.v = locomotive.v * 2.0; 
                locomotive.v = 0.1; 
            }
        }

        // Поступове уповільнення
        if (collisionOccurred) {
            wagon.v *= 0.995;
            locomotive.v *= 0.995;
        }

        for (let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.life -= 0.025;
            if (p.life <= 0) particles.splice(i, 1);
        }
    }

    function drawTrain(obj, isLoco) {
        ctx.save();
        ctx.translate(obj.x, obj.y - obj.h/2);

        // Тінь
        ctx.fillStyle = 'rgba(0,0,0,0.4)';
        ctx.fillRect(5, obj.h + 8, obj.w, 10);

        // Корпус
        ctx.fillStyle = obj.color;
        ctx.fillRect(0, 0, obj.w, obj.h);

        if (isLoco) {
            ctx.fillStyle = '#1e293b';
            ctx.fillRect(obj.w - 70, -25, 60, 40);
            ctx.fillStyle = '#facc15';
            ctx.fillRect(0, 30, obj.w - 70, 10);
            ctx.fillStyle = '#fef08a';
            ctx.beginPath();
            ctx.arc(obj.w, 20, 4, 0, Math.PI*2);
            ctx.fill();
        } else {
            ctx.strokeStyle = 'rgba(255,255,255,0.1)';
            for(let i=20; i<obj.w; i+=30) {
                ctx.strokeRect(i, 5, 2, obj.h - 10);
            }
            if (wagon.type === 'heavy') {
                ctx.fillStyle = '#451a03';
                ctx.beginPath();
                ctx.moveTo(10, 0);
                ctx.quadraticCurveTo(obj.w/2, -30, obj.w-10, 0);
                ctx.fill();
            }
        }

        ctx.fillStyle = '#0f172a';
        ctx.beginPath();
        ctx.arc(45, obj.h, 15, 0, Math.PI * 2);
        ctx.arc(obj.w - 45, obj.h, 15, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
    }

    function draw() {
        ctx.clearRect(0, 0, width, height);

        // Колія
        ctx.fillStyle = '#475569';
        ctx.fillRect(0, height/2 + 55, width, 8);
        for(let i=0; i<width; i+=50) {
            ctx.fillRect(i, height/2 + 55, 12, 18);
        }

        drawTrain(locomotive, true);
        drawTrain(wagon, false);

        particles.forEach(p => {
            ctx.fillStyle = `rgba(253, 224, 71, ${p.life})`;
            ctx.fillRect(p.x, p.y, 3, 3);
        });
    }

    function animate() {
        update();
        draw();
        requestAnimationFrame(animate);
    }

    window.addEventListener('resize', resize);
    resize();
    animate();
</script>

</body>
</html>
