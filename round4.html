<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аномальне зіткнення: Тепловоз і вагони</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #0f172a;
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: white;
        }
        canvas {
            display: block;
        }
        .ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            pointer-events: none;
        }
        .controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.9);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid rgba(56, 189, 248, 0.3);
            display: flex;
            gap: 20px;
            pointer-events: auto;
        }
        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            transition: all 0.2s;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 12px;
        }
        .btn-blue { background: #0284c7; color: white; }
        .btn-blue:hover { background: #0369a1; }
        .btn-red { background: #e11d48; color: white; }
    </style>
</head>
<body>

<div class="ui-overlay">
    <h1 class="text-3xl font-black italic tracking-tighter">RAILWAY COLLISION</h1>
</div>

<div class="controls">
    <button class="btn btn-blue" onclick="startCollision('empty')">Зіткнення з ПОРОЖНІМ</button>
    <button class="btn btn-blue" onclick="startCollision('heavy')">Зіткнення з НАВАНТАЖЕНИМ</button>
    <button class="btn btn-red" onclick="resetSim()">Скидання</button>
</div>

<canvas id="simCanvas"></canvas>

<script>
    const canvas = document.getElementById('simCanvas');
    const ctx = canvas.getContext('2d');

    let width, height;
    let locomotive = { x: -200, y: 0, w: 180, h: 80, v: 0, color: '#0ea5e9' };
    let wagon = { x: 0, y: 0, w: 160, h: 80, v: 0, type: 'empty', color: '#64748b' };
    let particles = [];

    function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
        resetSim();
    }

    function resetSim() {
        locomotive.x = 100;
        locomotive.v = 0;
        wagon.x = width - 300;
        wagon.v = 0;
        wagon.type = 'empty';
        wagon.color = '#64748b';
        particles = [];
        locomotive.y = wagon.y = height / 2;
    }

    function startCollision(type) {
        resetSim();
        wagon.type = type;
        wagon.color = type === 'empty' ? '#64748b' : '#78350f';
        locomotive.v = 8; // Початкова швидкість тепловоза
    }

    function createSpark(x, y) {
        for(let i=0; i<20; i++) {
            particles.push({
                x: x, y: y,
                vx: (Math.random() - 0.5) * 10,
                vy: (Math.random() - 0.5) * 10,
                life: 1
            });
        }
    }

    function update() {
        locomotive.x += locomotive.v;
        wagon.x += wagon.v;

        // Перевірка зіткнення
        if (locomotive.x + locomotive.w >= wagon.x && locomotive.v > 0) {
            createSpark(wagon.x, wagon.y);
            
            if (wagon.type === 'empty') {
                // ПОМИЛКА: Порожній вагон поводиться як бетонна стіна
                wagon.v = 0.5; 
                locomotive.v = -2; // Тепловоз відскакує
            } else {
                // ПОМИЛКА: Важкий вагон відлітає занадто швидко
                wagon.v = locomotive.v * 3; 
                locomotive.v = 0.5; 
            }
        }

        // Оновлення часток
        particles.forEach((p, i) => {
            p.x += p.vx;
            p.y += p.vy;
            p.life -= 0.02;
            if(p.life <= 0) particles.splice(i, 1);
        });
    }

    function drawTrain(obj, isLoco) {
        ctx.save();
        ctx.translate(obj.x, obj.y - obj.h/2);

        // Тінь
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.fillRect(5, obj.h + 5, obj.w, 10);

        // Корпус
        ctx.fillStyle = obj.color;
        ctx.fillRect(0, 0, obj.w, obj.h);
        
        if (isLoco) {
            ctx.fillStyle = '#1e293b';
            ctx.fillRect(obj.w - 50, -20, 40, 30);
            ctx.fillStyle = '#38bdf8';
            ctx.fillRect(obj.w - 20, -10, 10, 15);
            ctx.fillStyle = '#facc15';
            ctx.fillRect(0, 20, obj.w - 50, 10);
        } else {
            ctx.strokeStyle = 'rgba(255,255,255,0.2)';
            ctx.strokeRect(10, 10, obj.w - 20, obj.h - 20);
            if (wagon.type === 'heavy') {
                ctx.fillStyle = '#451a03';
                ctx.fillRect(5, -15, obj.w - 10, 15);
            }
        }

        ctx.fillStyle = '#334155';
        ctx.beginPath();
        ctx.arc(30, obj.h, 12, 0, Math.PI * 2);
        ctx.arc(obj.w - 30, obj.h, 12, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
    }

    function draw() {
        ctx.clearRect(0, 0, width, height);

        ctx.strokeStyle = '#334155';
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(0, height/2 + 45);
        ctx.lineTo(width, height/2 + 45);
        ctx.moveTo(0, height/2 + 55);
        ctx.lineTo(width, height/2 + 55);
        ctx.stroke();

        for(let i=0; i<width; i+=40) {
            ctx.fillRect(i, height/2 + 45, 10, 15);
        }

        drawTrain(locomotive, true);
        drawTrain(wagon, false);

        particles.forEach(p => {
            ctx.fillStyle = `rgba(253, 224, 71, ${p.life})`;
            ctx.fillRect(p.x, p.y, 3, 3);
        });
    }

    function animate() {
        update();
        draw();
        requestAnimationFrame(animate);
    }

    window.addEventListener('resize', resize);
    resize();
    animate();
</script>

</body>
</html>
