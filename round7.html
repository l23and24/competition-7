<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сонячна система: Аномальний Місяць</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #020205;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>

<script>
let angleEarth = 0;
let angleMoon = 0;
let stars = [];

function setup() {
    // Створюємо полотно на весь доступний простір вікна
    createCanvas(windowWidth, windowHeight);
    
    // Генерація статичного зоряного неба
    for (let i = 0; i < 600; i++) {
        stars.push({
            x: random(width),
            y: random(height),
            size: random(0.5, 2.5),
            bright: random(100, 255)
        });
    }
}

function windowResized() {
    // Оновлення розміру полотна при зміні розміру вікна браузера
    resizeCanvas(windowWidth, windowHeight);
    
    // Перегенеруємо зірки, щоб вони заповнювали новий простір
    stars = [];
    for (let i = 0; i < 600; i++) {
        stars.push({
            x: random(width),
            y: random(height),
            size: random(0.5, 2.5),
            bright: random(100, 255)
        });
    }
}

function draw() {
    background(2, 2, 8);
    
    // Малюємо зорі на фоні
    noStroke();
    for (let i = 0; i < stars.length; i++) {
        let s = stars[i];
        fill(255, s.bright);
        ellipse(s.x, s.y, s.size);
    }

    translate(width / 2, height / 2);

    // 1. СОНЦЕ
    drawSun();

    // 2. ОРБІТА ЗЕМЛІ
    let earthOrbitRel = min(width, height) * 0.35;
    noFill();
    stroke(255, 15);
    ellipse(0, 0, earthOrbitRel * 2);

    // Позиція Землі (рух проти годинникової стрілки)
    let ex = cos(angleEarth) * earthOrbitRel;
    let ey = sin(angleEarth) * earthOrbitRel;

    push();
    translate(ex, ey);
    
    // 3. ЗЕМЛЯ
    drawEarth();

    // 4. ОРБІТА МІСЯЦЯ
    let moonOrbitRel = 75;
    stroke(255, 25);
    ellipse(0, 0, moonOrbitRel * 2);

    // 5. МІСЯЦЬ (АНОМАЛІЯ: рух ЗА годинниковою стрілкою)
    let mx = cos(angleMoon) * moonOrbitRel;
    let my = sin(angleMoon) * moonOrbitRel;

    translate(mx, my);
    drawMoon();
    pop();

    // Оновлення швидкостей
    // Земля: зменшуємо кут для руху ПРОТИ годинникової стрілки
    angleEarth -= 0.003; 
    
    // Місяць: збільшуємо кут для руху ЗА годинниковою стрілкою
    angleMoon += 0.02;   
}

function drawSun() {
    push();
    noStroke();
    fill(255, 200, 0, 50);
    ellipse(0, 0, 80);
    fill(255, 230, 0);
    ellipse(0, 0, 60);
    pop();
}

function drawEarth() {
    push();
    noStroke();
    // Океан
    fill(0, 100, 255);
    ellipse(0, 0, 35);
    
    // Схематичні материки
    fill(50, 200, 50);
    // Власне обертання Землі
    rotate(-angleEarth * 5); 
    ellipse(5, 0, 15, 10);
    ellipse(-8, 5, 12, 18);
    pop();
}

function drawMoon() {
    push();
    noStroke();
    fill(200);
    ellipse(0, 0, 12);
    // Кратери
    fill(150);
    ellipse(-2, -2, 3, 3);
    ellipse(2, 3, 2, 2);
    pop();
}
</script>

</body>
</html>
