<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Симуляція: Аномальна Пружність</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/addons/p5.sound.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #1a1a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>

<script>
let springY = 40; 
let restLength = 160; // Умовне положення рівноваги
let currentHeight = 160; 
let velocity = 0;     
let mass = 2.0;       
let k = 0.12;         // Жорсткість
let damping = 0.88;   
let gravity = 0.4;    

let dragging = false;
let osc;
let soundEnabled = false;

function setup() {
    createCanvas(windowWidth, windowHeight);
    osc = new p5.Oscillator('sine');
    osc.amp(0);
    osc.start();
}

function windowResized() {
    resizeCanvas(windowWidth, windowHeight);
}

function draw() {
    drawEnvironment();

    let startX = width / 2;
    let startY = springY;

    if (dragging) {
        currentHeight = constrain(mouseY - startY, 40, height - 150);
        velocity = 0;
    } else {
        let x = currentHeight - restLength;
        
        // Сила пружності (аномальна)
        let fSpring = k * x; 
        let fGravity = gravity * mass;
        
        // Сумарна сила з урахуванням антигравітаційного утримання
        let totalForce = (fSpring + fGravity) * -1; 
        
        let acceleration = totalForce / mass;
        velocity += acceleration;
        velocity *= damping; 
        currentHeight += velocity;
        
        // Обмеження, щоб кубик не падав за стіл
        let tableLimit = height - 180;
        if (currentHeight > tableLimit) {
            currentHeight = tableLimit;
            velocity *= -0.1;
        }
        if (currentHeight < 40) {
            currentHeight = 40;
            velocity = 0;
        }
    }
    
    updateSound(currentHeight, velocity);

    let weightTopY = startY + currentHeight; 
    let weightCenterY = weightTopY + 30;    

    drawShadow(startX, weightTopY);
    drawStand(startX, startY);
    drawSpring(startX, startY, currentHeight);
    drawWeight(startX, weightTopY);

    // Візуалізація векторів
    let deformation = currentHeight - restLength;
    
    // Fт (Зелена) - гравітація вниз
    drawArrow(startX, weightCenterY, 60, color(46, 204, 113), "Fт");
    
    // Fпр (Червона) - ТЕПЕР ЗАВЖДИ ВНИЗ, навіть у рівновазі
    let fPrVisualLen = 40 + (deformation * 0.8); 
    
    // Малюємо силу пружності, що тисне вниз
    drawArrow(startX, weightTopY, max(20, fPrVisualLen), color(231, 76, 60), "Fпр");

    drawSoundButton();
}

function drawEnvironment() {
    noStroke();
    let tableY = height - 120;

    // Стіна
    for (let i = 0; i < height; i++) {
        let inter = map(i, 0, height, 0, 1);
        let c = lerpColor(color(189, 195, 199), color(149, 165, 166), inter);
        stroke(c);
        line(0, i, width, i);
    }
    
    // Лінія стику столу
    stroke(127, 140, 141);
    strokeWeight(1);
    line(0, tableY, width, tableY);

    // Поверхня столу
    noStroke();
    fill(100, 70, 45); 
    rect(0, tableY, width, height - tableY);
    
    // Текстура дерева
    stroke(80, 50, 30);
    for(let j = tableY + 10; j < height; j += 15) {
        line(0, j, width, j + random(-2, 2));
    }
}

function drawStand(x, y) {
    push();
    fill(60);
    rectMode(CENTER);
    noStroke();
    rect(x, y - 10, 80, 20, 3); 
    fill(40);
    ellipse(x, y - 5, 15, 15); 
    pop();
}

function drawShadow(x, weightY) {
    push();
    let tableSurfaceY = height - 120;
    let distToTable = tableSurfaceY - (weightY + 60);
    let opacity = map(distToTable, 0, height, 100, 0);
    let sizeScale = map(distToTable, 0, height, 1.1, 0.2);
    if (opacity > 0) {
        noStroke();
        fill(0, opacity);
        ellipse(x, tableSurfaceY + 5, 80 * sizeScale, 20 * sizeScale);
    }
    pop();
}

function drawSpring(x, y, h) {
    push();
    stroke(70);
    strokeWeight(3);
    noFill();
    let segments = 25;
    let r = 16;
    beginShape();
    vertex(x, y);
    for (let i = 0; i <= segments; i++) {
        let py = y + (i * h / segments);
        let px = x + (i % 2 === 0 ? r : -r);
        if (i > 0 && i < segments) {
            curveVertex(px, py);
        } else {
            vertex(x, py);
        }
    }
    vertex(x, y + h);
    endShape();
    pop();
}

function drawWeight(x, y) {
    push();
    noStroke();
    fill(0, 40); 
    rect(x - 32, y + 3, 70, 60, 4);
    stroke(44, 62, 80);
    strokeWeight(2);
    fill(52, 152, 219); 
    rect(x - 35, y, 70, 60, 4); 
    fill(255, 80);
    noStroke();
    rect(x - 30, y + 5, 60, 8, 2);
    fill(44, 62, 80);
    ellipse(x, y + 30, 8, 8);
    pop();
}

function drawArrow(x, y, len, col, label) {
    push();
    stroke(col);
    strokeWeight(5);
    line(x, y, x, y + len);
    let arrowSize = 10;
    let arrowDir = len > 0 ? 1 : -1;
    line(x, y + len, x - arrowSize, y + len - (arrowSize * arrowDir));
    line(x, y + len, x + arrowSize, y + len - (arrowSize * arrowDir));
    fill(col);
    noStroke();
    textSize(18);
    textStyle(BOLD);
    textAlign(len > 0 ? LEFT : RIGHT, CENTER);
    text(label, x + (len > 0 ? 20 : -20), y + len);
    ellipse(x, y, 8, 8);
    pop();
}

function updateSound(h, v) {
    if (!soundEnabled) {
        osc.amp(0, 0.1);
        return;
    }
    let freq = map(h, 40, height, 500, 100);
    osc.freq(freq, 0.05);
    let volume = map(abs(v), 0, 10, 0, 0.4);
    osc.amp(volume, 0.05);
}

function drawSoundButton() {
    push();
    let btnX = width - 50;
    let btnY = 50;
    stroke(52, 73, 94);
    strokeWeight(2);
    fill(soundEnabled ? color(52, 152, 219) : color(220));
    ellipse(btnX, btnY, 44, 44);
    fill(255);
    noStroke();
    rectMode(CENTER);
    rect(btnX - 4, btnY, 7, 7);
    beginShape();
    vertex(btnX - 2, btnY - 4);
    vertex(btnX + 5, btnY - 10);
    vertex(btnX + 5, btnY + 10);
    vertex(btnX - 2, btnY + 4);
    endShape(CLOSE);
    pop();
}

async function toggleSound() {
    if (getAudioContext().state !== 'running') {
        await userStartAudio();
    }
    soundEnabled = !soundEnabled;
}

function mousePressed() {
    let d = dist(mouseX, mouseY, width - 50, 50);
    if (d < 22) {
        toggleSound();
        return;
    }
    let startX = width / 2;
    let weightTopY = springY + currentHeight;
    if (mouseX > startX - 45 && mouseX < startX + 45 && 
        mouseY > weightTopY - 10 && mouseY < weightTopY + 70) {
        dragging = true;
        if (getAudioContext().state !== 'running') userStartAudio();
    }
}

function mouseReleased() {
    dragging = false;
}
</script>

</body>
</html>
